<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    color: #1a1a1a;
    background: #fff;
    padding: 80px;
    display: flex;
    flex-direction: column;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .logo {
    width: 72px;
    height: 72px;
    background: #1a1a1a;
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 36px;
    line-height: 1;
  }
  .wordmark {
    font-variant-caps: all-small-caps;
    letter-spacing: 0.06em;
    font-weight: 600;
    font-size: 40px;
  }
  .hero {
    margin-top: auto;
  }
  h1 {
    font-size: 88px;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.025em;
  }
  .cta {
    margin-top: 32px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    color: #1a1a1a;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .cta-arrow {
    margin-left: 12px;
  }
  .heart { color: #f08800; font-style: normal; }
</style>
</head>
<body>
<div class="brand">
  <div class="logo">P</div>
  <div class="wordmark">Profound</div>
</div>
<div class="hero">
  <h1>Playbooks &amp; instruments<br>for systems of work.</h1>
  <div class="cta">Read at profound.fyi <span class="cta-arrow">→</span></div>
</div>
</body>
</html>
